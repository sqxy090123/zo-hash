name: Publish to PyPI and GitHub Release

on:
  push:
    tags:
      - 'v*-*'
  workflow_dispatch:
    inputs:
      version:
        description: '基础版本号 (如 1.0.1)'
        required: true
      type:
        description: '发布类型 (fix|beta|test|patch)'
        required: true
        default: 'patch'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version and type
        id: parse
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${{ github.ref_name }}"
            TAG_NO_V="${TAG#v}"
            BASE_VERSION=$(echo "$TAG_NO_V" | cut -d'-' -f1)
            TYPE=$(echo "$TAG_NO_V" | cut -d'-' -f2-)
            case "$TYPE" in
              fix|f) TYPE_SHORT="f" ;;
              beta|b) TYPE_SHORT="b" ;;
              test|t) TYPE_SHORT="t" ;;
              patch|p) TYPE_SHORT="p" ;;
              *) echo "Unknown type: $TYPE"; exit 1 ;;
            esac
          else
            BASE_VERSION="${{ github.event.inputs.version }}"
            TYPE_SHORT="${{ github.event.inputs.type }}"
            case "$TYPE_SHORT" in
              fix|f) TYPE_SHORT="f" ;;
              beta|b) TYPE_SHORT="b" ;;
              test|t) TYPE_SHORT="t" ;;
              patch|p) TYPE_SHORT="p" ;;
              *) echo "Invalid type"; exit 1 ;;
            esac
          fi
          echo "base_version=$BASE_VERSION" >> $GITHUB_OUTPUT
          echo "type=$TYPE_SHORT" >> $GITHUB_OUTPUT

      - name: Read and increment counter
        id: counter
        run: |
          COUNTER_FILE=".version-counters.json"
          if [ ! -f "$COUNTER_FILE" ]; then echo '{}' > "$COUNTER_FILE"; fi
          python -c "import json, os; f='$COUNTER_FILE'; d=json.load(open(f)); t='${{ steps.parse.outputs.type }}'; d[t]=d.get(t,0)+1; json.dump(d,open(f,'w')); print(f'new_counter={d[t]}')" >> $GITHUB_OUTPUT

      - name: Generate final version
        id: version
        run: |
          FINAL_VERSION="${{ steps.parse.outputs.base_version }}+${{ steps.parse.outputs.type }}.${{ steps.counter.outputs.new_counter }}"
          echo "final_version=$FINAL_VERSION" >> $GITHUB_OUTPUT

      - name: Update setup.py with final version
        env:
          FINAL_VERSION: ${{ steps.version.outputs.final_version }}
        run: |
          python -c "import os, re; version = os.environ['FINAL_VERSION']; content = open('setup.py').read(); new_content = re.sub(r\"version=['\\\"]([^'\\\"]+)['\\\"]\", f\"version='{version}'\", content); open('setup.py', 'w').write(new_content)"

      - name: Commit counter file (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .version-counters.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update version counter for ${{ steps.parse.outputs.type }}"
          git push

      - name: Show final version
        run: grep version setup.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}