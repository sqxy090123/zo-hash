name: Publish to PyPI and GitHub Release

on:
  push:
    tags:
      - 'v*'                # 推送以 v 开头的标签时触发
  workflow_dispatch:        # 支持手动触发

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # 用于 PyPI 的 OIDC 认证
      contents: write        # 用于创建 GitHub Release
      packages: write        # 可选，如果也发布到 GitHub Packages

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # 确保获取所有标签（用于 setuptools_scm 可选）

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel twine build

      - name: Build package
        run: |
          python -m build
          ls -l dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*        # 将分发包附加到 Release
          generate_release_notes: true   # 自动生成更新日志（基于 PR 标题等）
          # 如果不想自动生成，可手动指定 body: "Release notes here"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
