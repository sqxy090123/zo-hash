name: Publish to PyPI and GitHub Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # 用于 PyPI OIDC 认证
      contents: write   # 用于创建 GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 从 setup.py 中提取基础版本（如 1.0.0.1）
      - name: Extract base version
        id: base_version
        run: |
          # 匹配 version='...' 或 version="..." 中的内容
          VERSION=$(grep -oP "(?<=version=['\"])([^'\"]+)" setup.py | head -1)
          echo "base_version=$VERSION" >> $GITHUB_OUTPUT

      # 生成完整版本号：base_version-pref.<run_number>
      - name: Generate dynamic version
        id: dynamic_version
        run: |
          FULL_VERSION="${{ steps.base_version.outputs.base_version }}-pref.${{ github.run_number }}"
          echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT

      # 将 setup.py 中的版本号替换为动态版本（单行命令，避免缩进问题）
      - name: Set dynamic version in setup.py
        env:
          FULL_VERSION: ${{ steps.dynamic_version.outputs.full_version }}
        run: |
          python -c "import os, re; full_version = os.environ['FULL_VERSION']; content = open('setup.py').read(); new_content = re.sub(r\"version=['\\\"]([^'\\\"]+)['\\\"]\", f\"version='{full_version}'\", content); open('setup.py', 'w').write(new_content)"

      # 可选：显示修改后的版本以确认
      - name: Show version
        run: grep version setup.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      # 如果是标签触发，则创建 GitHub Release 并附加分发包
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
